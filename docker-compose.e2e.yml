#   ./scripts/wait-for-services.sh
#   make test-e2e
#   docker-compose -f docker-compose.e2e.yml down

version: '3.8'

services:
  # TelemetryFlow Agent under test
  tfo-agent-e2e:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TELEMETRYFLOW_API_ENDPOINT=http://mock-backend:8080
      - TELEMETRYFLOW_LOG_LEVEL=debug
    volumes:
      - ./tests/e2e/testdata/e2e-config.yaml:/etc/tfo-agent/tfo-agent.yaml:ro
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - e2e-test

  # OTEL Collector to receive telemetry from agent
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Metrics
      - "13133:13133" # Health check
    volumes:
      - ./tests/e2e/testdata/otel-collector.yaml:/etc/otel/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - e2e-test

  # Mock backend API for agent registration/heartbeat
  mock-backend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./tests/e2e/testdata/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - e2e-test

  # Jaeger for trace visualization (optional)
  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - e2e-test

networks:
  e2e-test:
    driver: bridge
